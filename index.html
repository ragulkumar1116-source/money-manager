<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager Pro v3.5 - Corporate Gateway</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="auth-body">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <div class="brand-badge">💼</div>
      <h2>Money Manager Pro</h2>
      <p id="auth-subtitle">Sign in to access your secure financial logs</p>
    </div>

    <div id="login-form-group">
      <div class="input-wrapper">
        <label>Email Address</label>
        <input type="email" id="auth-email" placeholder="name@domain.com" required>
      </div>
      <div class="input-wrapper">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" id="btn-login" style="width: 100%;">Secure Login</button>
      
      <div class="auth-actions">
        <a href="newregistration.html" class="auth-link">Create Account</a>
        <a href="forgot.html" class="auth-link">Forgot Password?</a>
      </div>
    </div>
  </div>

  <script src="app1.js"></script>
</body>
</html>
